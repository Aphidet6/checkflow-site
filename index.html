<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Flow Test Doc — Roblox Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#c9c7be;
  --text:#1a1917;--text2:#5c5a54;--text3:#9c9a94;
  --accent:#7c3aed;--accent-bg:#f0ebff;
  --pass:#3b6d11;--pass-bg:#eaf3de;--pass-border:#7db33a;
  --fail:#a32d2d;--fail-bg:#fcebeb;--fail-border:#d96060;
  --warn:#854f0b;--warn-bg:#faeeda;--warn-border:#e8a020;
  --todo:#444441;--todo-bg:#f1efe8;--todo-border:#b4b2a9;
  --auto-pass:#0f6e56;--auto-pass-bg:#e1f5ee;
  --auto-fail:#993c1d;--auto-fail-bg:#faece7;
  --manual:#185fa5;--manual-bg:#e6f1fb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;height:60px}
.hdr h1{font-size:15px;font-weight:600}
.hdr p{font-size:12px;color:var(--text3)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--text2)}
.pill b{color:var(--accent)}
.name-btn{background:var(--accent-bg);color:var(--accent);border:1px solid #c4b5fd;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer}
.name-btn:hover{background:#e8dfff}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px)}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sb-section{margin-bottom:.5rem}
.sb-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:0 1rem .4rem}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 1rem;font-size:12px;color:var(--text2);cursor:pointer;text-decoration:none;border-left:2px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-pass{background:var(--pass)}.d-fail{background:var(--fail)}.d-warn{background:#f59e0b}.d-todo{background:var(--border2)}

/* MAIN */
.main{flex:1;padding:1.75rem;max-width:880px}

/* SUMMARY BAR */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.75rem}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.875rem 1rem}
.sum-card .num{font-size:22px;font-weight:600;line-height:1}
.sum-card .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.sum-pass .num{color:var(--pass)}.sum-fail .num{color:var(--fail)}.sum-warn .num{color:#d97706}.sum-todo .num{color:var(--text3)}

/* AUTO-CHECK LEGEND */
.legend{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;font-size:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* PLACE HEADER */
.place-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;margin-top:2rem}
.place-hdr:first-of-type{margin-top:0}
.place-badge{padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600}
.b-lobby{background:var(--auto-pass-bg);color:var(--auto-pass)}
.b-game{background:var(--manual-bg);color:var(--manual)}
.place-count{font-size:12px;color:var(--text3)}

/* SYSTEM CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:.875rem;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 1px 8px rgba(0,0,0,.06)}
.card-hdr{display:flex;align-items:center;gap:10px;padding:.875rem 1.125rem;cursor:pointer;user-select:none}
.card-hdr:hover{background:var(--surface2)}
.snum{width:26px;height:26px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}
.ctitle{font-size:13px;font-weight:600;flex:1}
.sbadge{padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;flex-shrink:0}
.s-pass{background:var(--pass-bg);color:var(--pass);border:1px solid var(--pass-border)}
.s-fail{background:var(--fail-bg);color:var(--fail);border:1px solid var(--fail-border)}
.s-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.s-todo{background:var(--todo-bg);color:var(--todo);border:1px solid var(--todo-border)}
.chev{font-size:11px;color:var(--text3);transition:transform .2s;margin-left:2px}
.chev.open{transform:rotate(180deg)}

/* CARD BODY */
.cbody{display:none;border-top:1px solid var(--border)}
.cbody.open{display:block}
.csec{padding:.875rem 1.125rem;border-bottom:1px solid var(--border)}
.csec:last-child{border-bottom:none}
.slabel{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.4rem}
.wtext{font-size:13px;color:var(--text2);line-height:1.7}

/* AUTO CHECKS */
.auto-section{display:grid;gap:5px}
.acheck{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;font-size:12px}
.acheck.a-pass{background:var(--auto-pass-bg);color:var(--auto-pass)}
.acheck.a-fail{background:var(--auto-fail-bg);color:var(--auto-fail)}
.acheck-icon{font-size:13px;flex-shrink:0}
.acheck-text{flex:1}
.acheck-type{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;flex-shrink:0}
.type-script{background:#ddd6fe;color:#5b21b6}
.type-remote{background:#bfdbfe;color:#1d4ed8}
.type-module{background:#d1fae5;color:#065f46}
.type-logic{background:#fed7aa;color:#9a3412}

/* FLOW STEPS */
.flow-list{list-style:none;display:grid;gap:3px}
.fstep{display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:12px;color:var(--text2)}
.fnum{width:18px;height:18px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:var(--accent)}

/* CHECKLIST */
.cklist{list-style:none;display:grid;gap:2px}
.ckitem{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.ckitem:last-child{border-bottom:none}
.ckitem input[type=checkbox]{width:15px;height:15px;margin-top:2px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.cklabel{font-size:12px;color:var(--text2);flex:1;cursor:pointer}
.cklabel.ckd{text-decoration:line-through;color:var(--text3)}
.ckcount{font-size:11px;color:var(--text3)}

/* PROGRESS BAR */
.pbwrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:7px;overflow:hidden}
.pbfill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* STATUS SELECTOR */
.ssel{display:flex;gap:5px;flex-wrap:wrap}
.sbtn{padding:3px 10px;border-radius:5px;border:1.5px solid transparent;font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--text2)}
.sbtn:hover{border-color:var(--border2)}
.sbtn.sel-pass{background:var(--pass-bg);color:var(--pass);border-color:var(--pass-border)}
.sbtn.sel-fail{background:var(--fail-bg);color:var(--fail);border-color:var(--fail-border)}
.sbtn.sel-warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.sbtn.sel-todo{background:var(--todo-bg);color:var(--todo);border-color:var(--todo-border)}

/* WARN/VERIFY BOXES */
.warnbox{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--warn);margin-bottom:.75rem;font-weight:500}
.verifybox{background:var(--manual-bg);border:1px solid #93c5fd;border-radius:7px;padding:7px 10px;font-size:12px;color:var(--manual);margin-bottom:.75rem}

/* COMMENTS */
.cmt-item{background:var(--surface2);border-radius:7px;padding:8px 10px;margin-bottom:6px}
.cmt-author{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px}
.cmt-text{font-size:12px;color:var(--text2);line-height:1.5}
.cmt-time{font-size:10px;color:var(--text3);margin-top:3px}
.cmt-del{float:right;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 3px;line-height:1}
.cmt-del:hover{color:var(--fail)}
.add-cmt{display:flex;gap:7px;margin-top:7px}
.add-cmt textarea{flex:1;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:inherit;resize:none;background:var(--surface);color:var(--text);min-height:52px}
.add-cmt textarea:focus{outline:none;border-color:var(--accent)}
.cmt-sub{align-self:flex-end;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.cmt-sub:hover{background:#6d28d9}

/* SCRIPTS TAGS */
.stags{display:flex;flex-wrap:wrap;gap:5px}
.stag{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--text2);font-family:'SF Mono','Fira Code',monospace}

/* KNOWN BUGS */
.bugs{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.125rem 1.375rem;margin-bottom:1.75rem}
.bugs h2{font-size:14px;font-weight:600;margin-bottom:.875rem}
.bug-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-top:1px solid var(--border);font-size:12px}
.bbadge{flex-shrink:0;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
.bhi{background:var(--fail-bg);color:var(--fail)}.bme{background:var(--warn-bg);color:var(--warn)}

/* NAME MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;align-items:center;justify-content:center}
.moverlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:1.375rem;width:320px;border:1px solid var(--border)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:6px}
.modal p{font-size:12px;color:var(--text2);margin-bottom:.875rem}
.modal input{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);margin-bottom:.875rem}
.modal input:focus{outline:none;border-color:var(--accent)}
.modal-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:9px;font-size:13px;font-weight:500;cursor:pointer}
.modal-btn:hover{background:#6d28d9}

@media(max-width:768px){.sidebar{display:none}.main{padding:1rem}.hdr{padding:0 1rem}}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <h1>🎮 Check Flow Test Doc</h1>
    <p>Lobby + yshibuya — Roblox Multiplayer Shooter</p>
  </div>
  <div class="hdr-right">
    <div class="pill">🤖 Auto: <b id="auto-pass-count">0</b>/<b id="auto-total-count">0</b></div>
    <div class="pill">✋ Manual: <b id="done-count">0</b>/<b id="total-count">0</b></div>
    <button class="name-btn" onclick="openNameModal()">👤 <span id="cur-name">Set Name</span></button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<div class="moverlay" id="name-modal">
  <div class="modal">
    <h3>Your Name</h3>
    <p>So your team knows who left each comment.</p>
    <input type="text" id="name-input" placeholder="e.g. Earthza, Dev1, Tester..." maxlength="30"/>
    <button class="modal-btn" onclick="saveName()">Save</button>
  </div>
</div>

    <div class="sb-section">
      <div class="sb-label">🏠 Lobby (${lobby.length})</div>
      ${lobby.map(s => `<a class="sb-item" href="#sys-${s.id}"><span class="sb-dot d-todo" id="sd-${s.id}"></span><span style="overflow:hidden;text-overflow:ellipsis">${s.title}</span></a>`).join('')}
    </div>
    <div class="sb-section">
      <div class="sb-label">⚔️ yshibuya (${game.length})</div>
      ${game.map(s => `<a class="sb-item" href="#sys-${s.id}"><span class="sb-dot d-todo" id="sd-${s.id}"></span><span style="overflow:hidden;text-overflow:ellipsis">${s.title}</span></a>`).join('')}
    </div>`;
  refreshDots();
}

function buildMain() {
  const m = document.getElementById('main');
  let h = '';

  // Summary
  const st = load();
  const pass = SYSTEMS.filter(s => (st[s.id] || {}).status === 'pass').length;
  const fail = SYSTEMS.filter(s => (st[s.id] || {}).status === 'fail').length;
  const warn = SYSTEMS.filter(s => (st[s.id] || {}).status === 'warn').length;
  const todo = SYSTEMS.length - pass - fail - warn;
  h += `<div class="summary">
    <div class="sum-card sum-pass"><div class="num">${pass}</div><div class="lbl">✅ Working</div></div>
    <div class="sum-card sum-fail"><div class="num">${fail}</div><div class="lbl">❌ Broken</div></div>
    <div class="sum-card sum-warn"><div class="num">${warn}</div><div class="lbl">⚠️ Has issues</div></div>
    <div class="sum-card sum-todo"><div class="num">${todo}</div><div class="lbl">📋 Not tested</div></div>
  </div>`;

  // Auto check summary
  h += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem">
      <span style="font-size:14px;font-weight:600">🤖 Automatic Code Scan Results</span>
      <span style="font-size:12px;color:var(--text3)">Scanned directly from Roblox Studio</span>
      <span style="margin-left:auto;font-size:12px;font-weight:600;color:${autoPass===autoTotal?'var(--pass)':'var(--warn)'}">
        ${autoPass}/${autoTotal} passed
      </span>
    </div>
    <div class="legend">
      <span class="leg-item"><span class="leg-dot" style="background:var(--auto-pass-bg);border:1px solid var(--pass-border)"></span>Auto PASS — confirmed in code</span>
      <span class="leg-item"><span class="leg-dot" style="background:var(--auto-fail-bg);border:1px solid var(--fail-border)"></span>Auto FAIL — needs investigation</span>
      <span class="leg-item"><span class="leg-dot" style="background:var(--manual-bg);border:1px solid #93c5fd"></span>Manual only — needs human test</span>
    </div>
    <div style="font-size:12px;color:var(--text2)">
      Auto scan checks: <b>${autoPass} scripts/remotes/modules confirmed</b>, 
      <b style="color:var(--fail)">${autoTotal - autoPass} potential issues found</b>. 
      See each system card for details.
    </div>
  </div>`;

  // Known bugs
  h += `<div class="bugs"><h2>🐛 Issues Found by Auto Scan</h2>
    ${BUGS.map(b => `<div class="bug-row">
      <span class="bbadge ${b.sev==='high'?'bhi':'bme'}">${b.sev==='high'?'🔴 HIGH':'🟡 MED'}</span>
      <div><strong>${b.title}</strong><br><span style="color:var(--text2)">${b.detail}</span><br><span style="font-size:10px;color:var(--text3)">📍 ${b.where}</span></div>
    </div>`).join('')}
  </div>`;

  h += `<div class="place-hdr"><span class="place-badge b-lobby">🏠 Lobby</span><span class="place-count">Systems 1–15</span></div>`;
  SYSTEMS.filter(s => s.place === 'lobby').forEach(s => { h += buildCard(s); });
  h += `<div class="place-hdr"><span class="place-badge b-game">⚔️ yshibuya</span><span class="place-count">Systems 16–32</span></div>`;
  SYSTEMS.filter(s => s.place === 'game').forEach(s => { h += buildCard(s); });

  m.innerHTML = h;
  restoreState();
}

function buildCard(s) {
  const st = load();
  const cs = st[s.id] || {};
  const status = cs.status || 'todo';
  const checks = cs.checks || [];
  const comments = cs.comments || [];
  const done = checks.filter(Boolean).length;
  const total = s.checks.length;

  // Auto checks for this card
  const autoForCard = s.autoIds.map(id => AUTO_CHECKS[id]).filter(Boolean);
  const autoPassCard = autoForCard.filter(a => a.pass).length;
  const autoFailCard = autoForCard.filter(a => !a.pass).length;

  return `<div class="card" id="sys-${s.id}">
    <div class="card-hdr" onclick="toggleCard(${s.id})">
      <div class="snum">${s.id}</div>
      <div class="ctitle">${s.title}</div>
      ${autoForCard.length > 0 ? `<span style="font-size:10px;color:${autoFailCard>0?'var(--auto-fail)':'var(--auto-pass)'};background:${autoFailCard>0?'var(--auto-fail-bg)':'var(--auto-pass-bg)'};padding:2px 7px;border-radius:4px;font-weight:600;flex-shrink:0">
        🤖 ${autoPassCard}/${autoForCard.length}</span>` : ''}
      <span class="sbadge s-${status}" id="sb-${s.id}">${slabel(status)}</span>
      <span style="font-size:11px;color:var(--text3);margin-right:3px">${done}/${total}</span>
      <span class="chev" id="ch-${s.id}">▼</span>
    </div>
    <div class="cbody" id="cb-${s.id}">
      ${s.verify?`<div class="csec"><div class="verifybox">⚠️ Needs manual verification — some scripts for this system were not fully confirmed by auto-scan.</div></div>`:''}
      ${s.warn?`<div class="csec"><div class="warnbox">${s.warn}</div></div>`:''}

      <div class="csec">
        <div class="slabel">What it does</div>
        <div class="wtext">${s.what}</div>
      </div>

      <div class="csec">
        <div class="slabel">Scripts involved</div>
        <div class="stags">${s.scripts.map(sc=>`<span class="stag">${sc}</span>`).join('')}</div>
      </div>

      <div class="csec">
        <div class="slabel">Flow (step by step)</div>
        <ol class="flow-list">${s.flow.map((f,i)=>`<li class="fstep"><span class="fnum">${i+1}</span><span>${f}</span></li>`).join('')}</ol>
      </div>

      ${autoForCard.length > 0 ? `<div class="csec">
        <div class="slabel">🤖 Auto Scan Results (${autoPassCard}/${autoForCard.length} passed)</div>
        <div class="auto-section">
          ${autoForCard.map(a => `<div class="acheck ${a.pass?'a-pass':'a-fail'}">
            <span class="acheck-icon">${a.pass?'✅':'❌'}</span>
            <span class="acheck-text">${a.l}</span>
            <span class="acheck-type type-${a.t}">${a.t}</span>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div class="csec">
        <div class="slabel">✋ Manual Checklist (${done}/${total})</div>
        <div class="pbwrap"><div class="pbfill" id="pb-${s.id}" style="width:${total>0?Math.round(done/total*100):0}%"></div></div>
        <ul class="cklist">
          ${s.checks.map((c,i)=>`<li class="ckitem">
            <input type="checkbox" id="ck-${s.id}-${i}" ${checks[i]?'checked':''} onchange="toggleCheck(${s.id},${i})">
            <label class="cklabel ${checks[i]?'ckd':''}" for="ck-${s.id}-${i}">${c}</label>
          </li>`).join('')}
        </ul>
      </div>

      <div class="csec">
        <div class="slabel">Set Status</div>
        <div class="ssel">
          <button class="sbtn ${status==='todo'?'sel-todo':''}" onclick="setStatus(${s.id},'todo')">📋 Not tested</button>
          <button class="sbtn ${status==='pass'?'sel-pass':''}" onclick="setStatus(${s.id},'pass')">✅ Working</button>
          <button class="sbtn ${status==='fail'?'sel-fail':''}" onclick="setStatus(${s.id},'fail')">❌ Broken</button>
          <button class="sbtn ${status==='warn'?'sel-warn':''}" onclick="setStatus(${s.id},'warn')">⚠️ Has issues</button>
        </div>
      </div>

      <div class="csec">
        <div class="slabel">💬 Team Comments</div>
        <div id="cmts-${s.id}">
          ${comments.length===0?`<p style="font-size:12px;color:var(--text3)">No comments yet.</p>`:comments.map((c,i)=>buildCmt(s.id,c,i)).join('')}
        </div>
        <div class="add-cmt">
          <textarea id="nc-${s.id}" placeholder="Leave a note for your team..." rows="2"></textarea>
          <button class="cmt-sub" onclick="addCmt(${s.id})">Post</button>
        </div>
      </div>
    </div>
  </div>`;
}

function buildCmt(sid, c, i) {
  return `<div class="cmt-item" id="c-${sid}-${i}">
    <button class="cmt-del" onclick="delCmt(${sid},${i})">✕</button>
    <div class="cmt-author">👤 ${c.author}</div>
    <div class="cmt-text">${c.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    <div class="cmt-time">${c.time}</div>
  </div>`;
}

const slabel = s => ({todo:'📋 Not tested',pass:'✅ Working',fail:'❌ Broken',warn:'⚠️ Has issues'}[s]||s);

function toggleCard(id) {
  document.getElementById('cb-'+id).classList.toggle('open');
  document.getElementById('ch-'+id).classList.toggle('open');
}

function toggleCheck(sid, idx) {
  const st = load();
  if (!st[sid]) st[sid] = {};
  if (!st[sid].checks) st[sid].checks = [];
  st[sid].checks[idx] = document.getElementById(`ck-${sid}-${idx}`).checked;
  save(st);
  const lbl = document.querySelector(`label[for="ck-${sid}-${idx}"]`);
  if (lbl) lbl.classList.toggle('ckd', st[sid].checks[idx]);
  updatePB(sid);
  updateCounts();
}

function updatePB(sid) {
  const sys = SYSTEMS.find(s => s.id === sid);
  const st = load();
  const checks = (st[sid]||{}).checks || [];
  const done = checks.filter(Boolean).length;
  const total = sys.checks.length;
  const pb = document.getElementById('pb-'+sid);
  if (pb) pb.style.width = (total>0?Math.round(done/total*100):0)+'%';
}

function setStatus(sid, status) {
  const st = load();
  if (!st[sid]) st[sid] = {};
  st[sid].status = status;
  save(st);
  const badge = document.getElementById('sb-'+sid);
  if (badge) { badge.className = 'sbadge s-'+status; badge.textContent = slabel(status); }
  const card = document.getElementById('sys-'+sid);
  if (card) {
    card.querySelectorAll('.sbtn').forEach(b => b.className = 'sbtn');
    const map = {todo:0,pass:1,fail:2,warn:3};
    const btns = card.querySelectorAll('.sbtn');
    if (btns[map[status]]) btns[map[status]].className = 'sbtn sel-'+status;
  }
  refreshDots();
  updateCounts();
  // update summary cards
  buildSummaryCards();
}

function buildSummaryCards() {
  const st = load();
  const pass = SYSTEMS.filter(s => (st[s.id]||{}).status==='pass').length;
  const fail = SYSTEMS.filter(s => (st[s.id]||{}).status==='fail').length;
  const warn = SYSTEMS.filter(s => (st[s.id]||{}).status==='warn').length;
  const todo = SYSTEMS.length - pass - fail - warn;
  const cards = document.querySelectorAll('.summary .num');
  if (cards[0]) cards[0].textContent = pass;
  if (cards[1]) cards[1].textContent = fail;
  if (cards[2]) cards[2].textContent = warn;
  if (cards[3]) cards[3].textContent = todo;
}

function addCmt(sid) {
  const ta = document.getElementById('nc-'+sid);
  const text = ta.value.trim();
  if (!text) return;
  const st = load();
  if (!st[sid]) st[sid] = {};
  if (!st[sid].comments) st[sid].comments = [];
  const now = new Date();
  const t = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  st[sid].comments.push({author:getName(),text,time:t});
  save(st);
  const div = document.getElementById('cmts-'+sid);
  const noC = div.querySelector('p');
  if (noC) noC.remove();
  const idx = st[sid].comments.length-1;
  div.insertAdjacentHTML('beforeend', buildCmt(sid, st[sid].comments[idx], idx));
  ta.value = '';
}

function delCmt(sid, idx) {
  if (!confirm('Delete this comment?')) return;
  const st = load();
  if (!st[sid]||!st[sid].comments) return;
  st[sid].comments.splice(idx,1);
  save(st);
  const div = document.getElementById('cmts-'+sid);
  div.innerHTML = '';
  const cmts = st[sid].comments;
  if (!cmts.length) { div.innerHTML = `<p style="font-size:12px;color:var(--text3)">No comments yet.</p>`; }
  else cmts.forEach((c,i) => div.insertAdjacentHTML('beforeend', buildCmt(sid,c,i)));
}

function refreshDots() {
  const st = load();
  SYSTEMS.forEach(s => {
    const dot = document.getElementById('sd-'+s.id);
    if (!dot) return;
    const status = (st[s.id]||{}).status || 'todo';
    dot.className = 'sb-dot '+{todo:'d-todo',pass:'d-pass',fail:'d-fail',warn:'d-warn'}[status];
  });
}

function updateCounts() {
  const st = load();
  let total = 0, done = 0;
  SYSTEMS.forEach(s => {
    total += s.checks.length;
    const checks = (st[s.id]||{}).checks || [];
    done += checks.filter(Boolean).length;
  });
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('auto-pass-count').textContent = autoPass;
  document.getElementById('auto-total-count').textContent = autoTotal;
}

function restoreState() {
  const st = load();
  SYSTEMS.forEach(s => {
    const cs = st[s.id]||{};
    if (cs.status && cs.status!=='todo') setStatus(s.id, cs.status);
    updatePB(s.id);
  });
}

function openNameModal() {
  document.getElementById('name-modal').classList.add('open');
  const n = getName();
  document.getElementById('name-input').value = n==='Unknown'?'':n;
  setTimeout(()=>document.getElementById('name-input').focus(),100);
}
function saveName() {
  const n = document.getElementById('name-input').value.trim();
  if (!n) return;
  localStorage.setItem('roblox_un', n);
  document.getElementById('cur-name').textContent = n;
  document.getElementById('name-modal').classList.remove('open');
}
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key==='Enter') saveName(); });
document.getElementById('name-modal').addEventListener('click', e => { if (e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });

const sn = localStorage.getItem('roblox_un');
if (sn) document.getElementById('cur-name').textContent = sn;
else setTimeout(openNameModal, 600);

buildPage();
</script>
</body>
</html>
